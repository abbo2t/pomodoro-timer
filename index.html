<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pomodoro</title>
<link rel="icon" id="favicon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #e63946;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    width:100%;
    overflow:hidden;
    background:#fff;
    font-family:'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  #app{
    position:fixed;
    inset:0;
    cursor:pointer;
  }

  /* backgrounds */
  #bgWhite{
    position:fixed;
    inset:0;
    background:#fff;
  }

  #bgColor{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    top:0%;
    background:var(--accent);
    transition: top 1s linear, background-color .6s ease;
  }

  /* duplicated text content, one white, one accent-colored, clipped against each other */
  .content{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2.2vh;
    pointer-events:none;
    transition: clip-path 1s linear;
    text-align:center;
  }

  .content-white{ color:#fff; clip-path: inset(0% 0 0 0); }
  .content-color{ color:var(--accent); clip-path: inset(0 0 100% 0); transition: clip-path 1s linear, color .6s ease; }

  .label{
    font-size:clamp(.75rem, 1.6vw, 1rem);
    font-weight:500;
    letter-spacing:.45em;
    text-transform:uppercase;
    opacity:.85;
    pointer-events:auto;
    cursor:pointer;
  }

  .timer{
    font-size:clamp(3.5rem, 20vw, 13rem);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:.01em;
    line-height:1;
  }

  .hint{
    font-size:clamp(.7rem, 1.3vw, .85rem);
    font-weight:400;
    letter-spacing:.2em;
    text-transform:uppercase;
    opacity:.6;
  }

  @media (prefers-reduced-motion: reduce){
    #bgColor, .content{ transition:none; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="bgWhite"></div>
  <div id="bgColor"></div>

  <div class="content content-white">
    <div class="label">Focus</div>
    <div class="timer">25:00</div>
    <div class="hint">tap to start</div>
  </div>

  <div class="content content-color">
    <div class="label">Focus</div>
    <div class="timer">25:00</div>
    <div class="hint">tap to start</div>
  </div>
</div>

<script>
(function(){

  const DURATIONS = { focus: 25 * 60, break: 5 * 60 };
  const COLORS = { focus: '#e63946', break: '#4caf50' };

  let mode = 'focus';
  let remaining = DURATIONS.focus;
  let running = false;
  let intervalId = null;
  let endTimestamp = null;
  const STORAGE_KEY = 'pomodoro-timer-state';

  const app = document.getElementById('app');
  const bgColor = document.getElementById('bgColor');
  const contentWhite = document.querySelector('.content-white');
  const contentColor = document.querySelector('.content-color');
  const timers = document.querySelectorAll('.timer');
  const labels = document.querySelectorAll('.label');
  const hints = document.querySelectorAll('.hint');
  const favicon = document.getElementById('favicon');
  const root = document.documentElement;

  function fmt(s){
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const ss = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + ss;
  }

  function setAll(nodelist, text){
    nodelist.forEach(n => n.textContent = text);
  }

  function applyAccent(){
    root.style.setProperty('--accent', COLORS[mode]);
  }

  function render(){
    setAll(timers, fmt(remaining));
    setAll(labels, mode === 'focus' ? 'Focus' : 'Break');

    let hint;
    if (running) hint = 'tap to pause';
    else if (remaining === DURATIONS[mode]) hint = 'tap to start';
    else hint = 'tap to resume';
    setAll(hints, hint);

    document.title = `${fmt(remaining)} · ${mode === 'focus' ? 'Focus' : 'Break'}`;

    const total = DURATIONS[mode];
    const elapsedFrac = Math.min(1, Math.max(0, 1 - remaining / total));
    const colorTop = elapsedFrac * 100;

    bgColor.style.top = colorTop + '%';
    contentWhite.style.clipPath = `inset(${colorTop}% 0 0 0)`;
    contentColor.style.clipPath = `inset(0 0 ${100 - colorTop}% 0)`;

    drawFavicon(remaining, total, COLORS[mode]);
  }

  function drawFavicon(remainingSeconds, totalSeconds, color){
    const size = 96;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const cx = size / 2, cy = size / 2;
    const rOuter = size / 2 - size * 0.04;
    const onePixelAtFaviconScale = size / 16; // favicons render around 16px in a browser tab
    const rInner = rOuter * 0.62 + onePixelAtFaviconScale;
    const remainingFrac = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;

    if (remainingFrac > 0.002){
      const elapsedFrac = 1 - remainingFrac;
      const start = -Math.PI / 2 + elapsedFrac * 2 * Math.PI;
      const end = -Math.PI / 2 + 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rOuter, start, end, false);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    // punch a clean, constant-background hole so the number never fights the pie's own contrast
    ctx.beginPath();
    ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    const minutesLeft = Math.max(1, Math.ceil(remainingSeconds / 60));
    const txt = String(minutesLeft);
    const fontFamily = 'Arial, Helvetica, sans-serif';
    const fontWeight = 'bold';

    // Measure against a fixed two-digit reference (the worst case for width)
    // rather than the actual text, so the font-size stays constant whether
    // we're showing one digit or two -- only what's drawn changes, not the size.
    const sizingReference = '88';
    const margin = 0.85; // fraction of the hole's diameter usable before touching the ring
    const maxDim = rInner * 2 * margin;
    const probeSize = 100;
    ctx.font = `${fontWeight} ${probeSize}px ${fontFamily}`;
    ctx.textAlign = 'center';
    const probe = ctx.measureText(sizingReference);
    const probeW = probe.width;
    const probeH = (probe.actualBoundingBoxAscent || probeSize * 0.7) + (probe.actualBoundingBoxDescent || 0);
    const scale = Math.min(maxDim / probeW, maxDim / probeH);
    const fontSize = Math.max(8, Math.floor(probeSize * scale));

    ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
    const finalMetrics = ctx.measureText(txt);
    const ascent = finalMetrics.actualBoundingBoxAscent || fontSize * 0.7;
    const descent = finalMetrics.actualBoundingBoxDescent || 0;
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = color;
    ctx.fillText(txt, cx, cy + (ascent - descent) / 2);

    favicon.href = canvas.toDataURL('image/png');
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        mode,
        durations: DURATIONS,
        running,
        remaining,
        endTime: running ? endTimestamp : null
      }));
    } catch(e){ /* storage unavailable (e.g. sandboxed preview) -- fail silently */ }
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const state = JSON.parse(raw);

      if (state.durations){
        if (state.durations.focus) DURATIONS.focus = state.durations.focus;
        if (state.durations.break) DURATIONS.break = state.durations.break;
      }
      mode = state.mode === 'break' ? 'break' : 'focus';

      if (state.running && typeof state.endTime === 'number'){
        let remMs = state.endTime - Date.now();
        let guard = 0;
        // catch up through any sessions that fully elapsed while the page was closed
        while (remMs <= 0 && guard < 200){
          mode = mode === 'focus' ? 'break' : 'focus';
          remMs += DURATIONS[mode] * 1000;
          guard++;
        }
        remaining = Math.max(0, Math.round(remMs / 1000));
        endTimestamp = Date.now() + remaining * 1000;
        running = true;
      } else if (typeof state.remaining === 'number'){
        remaining = Math.min(state.remaining, DURATIONS[mode]);
        running = false;
      }
    } catch(e){ /* corrupt or unavailable state -- start fresh */ }
  }

  function tick(){
    remaining = Math.max(0, Math.round((endTimestamp - Date.now()) / 1000));
    if (remaining <= 0){
      mode = mode === 'focus' ? 'break' : 'focus';
      remaining = DURATIONS[mode];
      endTimestamp = Date.now() + remaining * 1000;
      applyAccent();
    }
    render();
    saveState();
  }

  function start(){
    if (running) return;
    running = true;
    endTimestamp = Date.now() + remaining * 1000;
    intervalId = setInterval(tick, 1000);
    render();
    saveState();
  }

  function pause(){
    running = false;
    clearInterval(intervalId);
    render();
    saveState();
  }

  function toggle(){
    running ? pause() : start();
  }

  function resetSession(){
    pause();
    remaining = DURATIONS[mode];
    render();
    saveState();
  }

  function editDurations(){
    const f = parseFloat(window.prompt('Focus length, minutes:', DURATIONS.focus / 60));
    if (!isNaN(f) && f > 0) DURATIONS.focus = Math.round(f * 60);
    const b = parseFloat(window.prompt('Break length, minutes:', DURATIONS.break / 60));
    if (!isNaN(b) && b > 0) DURATIONS.break = Math.round(b * 60);
    remaining = DURATIONS[mode];
    render();
    saveState();
  }

  app.addEventListener('click', (e) => {
    if (e.target.classList.contains('label') && !running){
      editDurations();
    } else {
      toggle();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space'){ e.preventDefault(); toggle(); }
    if (e.key === 'r' || e.key === 'R'){ resetSession(); }
  });

  loadState();
  applyAccent();
  render();
  if (running){
    intervalId = setInterval(tick, 1000);
  }
})();
</script>

</body>
</html>
